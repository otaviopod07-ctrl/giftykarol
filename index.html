<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K.O</title>

<style>
body{
    margin:0;
    font-family: 'Courier New', monospace;
    background: radial-gradient(circle, #050505, #000);
    color:#c084fc;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

/* CONTAINER */
#app{
    width:90%;
    max-width:400px;
    border:1px solid #9333ea;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 20px #9333ea55;
    text-align:center;
}

/* TÍTULO */
h1{
    margin-bottom:20px;
    letter-spacing:2px;
}

/* BOTÕES */
button{
    width:100%;
    padding:12px;
    margin:10px 0;
    background:black;
    border:1px solid #9333ea;
    color:#c084fc;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#9333ea;
    color:black;
}

/* TELA ESCONDIDA */
.hidden{
    display:none;
}

/* TEXTO */
#text{
    margin-top:20px;
    font-size:14px;
    opacity:0.8;
}

/* PARTÍCULAS */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="app">

    <h1>giftykarol</h1>

    <div id="home">
        <button onclick="start()">iniciar</button>
    </div>

    <div id="screen1" class="hidden">
        <p id="text">carregando memória...</p>
        <button onclick="next1()">continuar</button>
    </div>

    <div id="screen2" class="hidden">
        <p id="text">vc significa mais do q imagina</p>
        <button onclick="next2()">avançar</button>
    </div>

    <div id="screen3" class="hidden">
        <p id="text">tô morrendo de saudade</p>
    </div>

</div>

<script>

/* TROCA DE TELAS */
function start(){
    document.getElementById("home").classList.add("hidden")
    document.getElementById("screen1").classList.remove("hidden")
}

function next1(){
    document.getElementById("screen1").classList.add("hidden")
    document.getElementById("screen2").classList.remove("hidden")
}

function next2(){
    document.getElementById("screen2").classList.add("hidden")
    document.getElementById("screen3").classList.remove("hidden")
}

/* PARTÍCULAS */
const canvas = document.getElementById("bg")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let particles = []

for(let i=0;i<60;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2,
        dx:(Math.random()-0.5),
        dy:(Math.random()-0.5)
    })
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height)

    ctx.fillStyle="#9333ea"

    particles.forEach(p=>{
        ctx.beginPath()
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
        ctx.fill()

        p.x+=p.dx
        p.y+=p.dy

        if(p.x<0||p.x>canvas.width) p.dx*=-1
        if(p.y<0||p.y>canvas.height) p.dy*=-1
    })

    requestAnimationFrame(draw)
}

draw()

</script>

</body>
</html>
